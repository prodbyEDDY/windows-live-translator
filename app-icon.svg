<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3b74f5"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- App tile -->
  <rect width="1024" height="1024" rx="232" fill="url(#tile)"/>
  <!-- Waveform / equalizer: five rounded bars, symmetric -->
  <g fill="#ffffff">
    <rect x="190" y="392" width="84" height="240" rx="42"/>
    <rect x="330" y="302" width="84" height="420" rx="42"/>
    <rect x="470" y="232" width="84" height="560" rx="42"/>
    <rect x="610" y="302" width="84" height="420" rx="42"/>
    <rect x="750" y="392" width="84" height="240" rx="42"/>
  </g>
</svg>
